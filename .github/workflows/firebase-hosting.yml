# GitHub Action for Firebase App Hosting
# This workflow runs tests and builds on every push to master and on PRs.
# Deployment is handled automatically by Firebase App Hosting on push to master.
#
# SETUP (GitHub Repository Secrets needed):
# 1. FIREBASE_SERVICE_ACCOUNT — JSON key from Firebase Console > Project Settings > Service Accounts
# 2. NEXT_PUBLIC_FIREBASE_API_KEY
# 3. NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
# 4. NEXT_PUBLIC_FIREBASE_PROJECT_ID
# 5. NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
# 6. NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
# 7. NEXT_PUBLIC_FIREBASE_APP_ID

name: CI — Test & Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm run test:ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Tag deployment version
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          VERSION="v$(date +'%Y%m%d')-${GITHUB_SHA::7}"
          echo "DEPLOY_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Deploying version: $VERSION"
